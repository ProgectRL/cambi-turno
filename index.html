<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Cambi Turno</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0F4D3F; }
    #app-frame { position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; }
    #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0F4D3F;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1rem; color: white; font-family: Arial, sans-serif; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .card { background: white; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      overflow: hidden; max-width: 420px; width: 90%; text-align: center; }
    .card-header { padding: 2rem; color: white; }
    .card-header h1 { font-size: 1.5rem; margin: 0; }
    .card-body { padding: 2rem; }
    .card-body p { color: #1E2D2B; font-size: 1rem; line-height: 1.6; margin-bottom: .5rem; }
    .card-body .sub { color: #6B8580; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>Caricamento...</p>
  </div>

  <iframe id="app-frame" allow="same-origin"></iframe>

  <div id="resultCard" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#F0F4F3;align-items:center;justify-content:center;">
    <div class="card">
      <div class="card-header" id="resultHeader"><h1 id="resultTitle"></h1></div>
      <div class="card-body"><p id="resultMessage"></p><p class="sub">Puoi chiudere questa pagina.</p></div>
    </div>
  </div>

  <script>
    var TARGET = 'https://script.google.com/macros/s/AKfycbz9U9z6oaFYAydCVxdsELQkWs54udavW453LzBvZyupfUoQB25lr3eccbdoRJFQM0TsZg/exec';

    function getParam(name) {
      var match = new RegExp('[?&]' + name + '=([^&]*)').exec(window.location.search);
      return match ? decodeURIComponent(match[1].replace(/\+/g, ' ')) : null;
    }

    var action = getParam('action');

    if (action) {
      var params = window.location.search.replace('?', '') + '&format=json';
      fetch(TARGET + '?' + params)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          document.getElementById('loading').style.display = 'none';
          var rc = document.getElementById('resultCard');
          rc.style.display = 'flex';
          document.getElementById('resultHeader').style.background = data.color || '#1A6B5A';
          document.getElementById('resultTitle').textContent = data.title || 'Fatto';
          document.getElementById('resultMessage').innerHTML = data.message || '';
        })
        .catch(function() {
          document.getElementById('loading').style.display = 'none';
          var rc = document.getElementById('resultCard');
          rc.style.display = 'flex';
          document.getElementById('resultHeader').style.background = '#C0392B';
          document.getElementById('resultTitle').textContent = 'Errore';
          document.getElementById('resultMessage').textContent = 'Impossibile contattare il server.';
        });
} else {
  window.location.replace(TARGET);
}
  </script>
</body>
</html>
