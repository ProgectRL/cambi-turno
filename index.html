<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambi Turno</title>
  <style>
    body { font-family: Arial, sans-serif; display: flex; align-items: center;
      justify-content: center; min-height: 100vh; margin: 0;
      background: #F0F4F3; flex-direction: column; gap: 1rem;
      text-align: center; padding: 1rem; }
    .spinner { width: 40px; height: 40px; border: 3px solid #D1DDD9;
      border-top-color: #1A6B5A; border-radius: 50%;
      animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .card { background: white; border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1); overflow: hidden;
      max-width: 420px; width: 100%; text-align: center; display: none; }
    .card-header { padding: 2rem; color: white; }
    .card-header h1 { font-size: 1.5rem; margin: 0; }
    .card-body { padding: 2rem; }
    .card-body p { color: #1E2D2B; font-size: 1rem; line-height: 1.6; margin-bottom: .5rem; }
    .card-body .sub { color: #6B8580; font-size: 0.85rem; }
    #loading p { color: #6B8580; font-size: .95rem; }
    .err-msg { color: #C0392B; font-size: .88rem; display: none; margin-top: .5rem; }
    a.fallback { color: #1A6B5A; font-weight: bold; }
  </style>
</head>
<body>

  <div id="loading">
    <div class="spinner"></div>
    <p>Registrazione risposta in corso...</p>
    <p class="err-msg" id="errMsg">
      Apri questo link con Edge o Safari per continuare.<br>
      <a class="fallback" id="fallbackLink" href="#">Tocca qui per copiare il link</a>
    </p>
  </div>

  <div class="card" id="resultCard">
    <div class="card-header" id="resultHeader">
      <h1 id="resultTitle"></h1>
    </div>
    <div class="card-body">
      <p id="resultMessage"></p>
      <p class="sub">Puoi chiudere questa pagina.</p>
    </div>
  </div>

  <script>
    var TARGET = 'https://script.google.com/macros/s/AKfycbz9U9z6oaFYAydCVxdsELQkWs54udavW453LzBvZyupfUoQB25lr3eccbdoRJFQM0TsZg/exec';

    function getParam(name) {
      var match = new RegExp('[?&]' + name + '=([^&]*)').exec(window.location.search);
      return match ? decodeURIComponent(match[1].replace(/\+/g, ' ')) : null;
    }

    var action  = getParam('action');
    var result  = getParam('result');
    var title   = getParam('title');
    var message = getParam('message');
    var color   = getParam('color');

    if (result === 'done') {
      document.getElementById('loading').style.display = 'none';
      var card = document.getElementById('resultCard');
      card.style.display = '';
      document.getElementById('resultHeader').style.background = color || '#1A6B5A';
      document.getElementById('resultTitle').textContent = title || 'Fatto';
      document.getElementById('resultMessage').innerHTML = message || '';
    } else if (action) {
      var dest = TARGET + window.location.search;
      document.getElementById('fallbackLink').href = dest;
      document.getElementById('fallbackLink').onclick = function(e) {
        e.preventDefault();
        if (navigator.clipboard) navigator.clipboard.writeText(dest);
        alert('Link copiato! Incollalo nella barra di Edge o Safari.');
      };
      try { window.location.replace(dest); }
      catch(e) { document.getElementById('errMsg').style.display = ''; }
      setTimeout(function() {
        document.getElementById('errMsg').style.display = '';
        document.querySelector('.spinner').style.display = 'none';
      }, 3000);
    } else {
      document.querySelector('.spinner').style.display = 'none';
      document.querySelector('#loading p').textContent = 'Pagina di servizio per Cambi Turno.';
    }
  </script>
</body>
</html>
