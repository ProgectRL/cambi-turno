<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambi Turno — Risposta in corso...</title>
  <style>
    body { font-family: Arial, sans-serif; display: flex; align-items: center;
      justify-content: center; min-height: 100vh; margin: 0;
      background: #F0F4F3; flex-direction: column; gap: 1rem; text-align: center; padding: 1rem; }
    .spinner { width: 40px; height: 40px; border: 3px solid #D1DDD9;
      border-top-color: #1A6B5A; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #6B8580; font-size: .95rem; }
    .err { color: #C0392B; display: none; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>Registrazione risposta in corso...</p>
  <p class="err" id="err">
    Apri questo link con Edge o Safari per continuare.<br>
    <a id="fallbackLink" href="#" style="color:#1A6B5A;font-weight:bold;">Tocca qui per copiare il link</a>
  </p>
  <script>
    var TARGET = 'https://script.google.com/macros/s/AKfycbz9U9z6oaFYAydCVxdsELQkWs54udavW453LzBvZyupfUoQB25lr3eccbdoRJFQM0TsZg/exec';
    var params = window.location.search;
    if (!params) { document.getElementById('err').style.display = ''; }
    else {
      var dest = TARGET + params;
      document.getElementById('fallbackLink').href = dest;
      document.getElementById('fallbackLink').onclick = function(e) {
        e.preventDefault();
        navigator.clipboard && navigator.clipboard.writeText(dest);
        alert('Link copiato! Incollalo nella barra di Edge o Safari.');
      };
      try { window.location.replace(dest); }
      catch(e) { document.getElementById('err').style.display = ''; }
      setTimeout(function() {
        document.getElementById('err').style.display = '';
        document.querySelector('.spinner').style.display = 'none';
      }, 3000);
    }
  </script>
</body>
</html>
